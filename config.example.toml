[hotkey]
toggle = "cmd+shift+space"

[asr]
provider = "aliyun"
model = "qwen3-asr-flash"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
language = "zh"
enable_itn = true
max_audio_mb = 10

[llm]
provider = "openai_compat"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen-plus"

[style]
mode = "polished"
custom_prompt = ""

[context]
enabled = true
ttl_seconds = 600
max_items = 20
max_chars = 6000
scope = "app"

[insert]
mode = "pasteboard_restore"
fallback = "unicode_events"
restore_delay_ms = 300

[audio]
sample_rate = 16000
channels = 1
