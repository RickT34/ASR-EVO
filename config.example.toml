[hotkey]
toggle = "cmd+shift+space"
mode = "toggle"

[asr]
provider = "aliyun"
model = "qwen3-asr-flash"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
language = "zh"
enable_itn = true
max_audio_mb = 10

[llm]
provider = "openai_compat"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen-plus"

[style]
mode = "polished"
custom_prompt = ""
prompts_dir = "prompts"

[context]
enabled = true
ttl_seconds = 600
max_items = 20
max_chars = 6000
scope = "app"

[insert]
mode = "pasteboard_restore"
fallback = "unicode_events"
restore_delay_ms = 300

[audio]
sample_rate = 16000
channels = 1

[storage]
enabled = true
database_path = "data/asr_evo.sqlite3"

[status]
idle_icon = "ASR"
recording_icon = "REC ASR"
transcribing_icon = "... ASR"
polishing_icon = "TXT ASR"
inserting_icon = "INS ASR"
error_icon = "! ASR"
idle_text = "空闲"
recording_text = "正在录音，再按快捷键停止"
transcribing_text = "正在转写"
polishing_text = "正在润色"
inserting_text = "正在插入"
error_text = "错误"
