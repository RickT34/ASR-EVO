# 外部触发控制接口。默认只监听 127.0.0.1，供本机工具调用。
# port 可改成其他本机端口；可用命令：asr-evo-control start | stop | toggle | status。
[control]
port = 8765

# 语音识别服务配置。API Key 从 .env 的 DASHSCOPE_API_KEY 读取。
[asr]
model = "qwen3-asr-flash"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# 文本润色模型配置。API Key 从 .env 的 DASHSCOPE_API_KEY 读取。
[llm]
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen-plus"

# 提示词风格配置。所有风格都来自 prompts_dir 目录中的 .md 文件。
# 风格 id 是提示词文件名去掉扩展名，例如 通用润色.md 对应 通用润色。
# 子文件夹会显示为子菜单，例如 写作/邮件.md 对应 写作/邮件。
[style]
mode = "通用润色"
prompts_dir = "prompts"
# 按应用绑定风格，key 是 bundle id，value 是风格 id。
# 示例：{ "com.apple.TextEdit" = "通用润色", "md.obsidian" = "会议纪要", "com.apple.mail" = "写作/邮件" }
app_styles = {}

# 润色上下文配置。开启后，最近听写记录会作为上下文发给 LLM，用于更连贯地润色。
[context]
enabled = true
# 超过这个时间的历史记录不会继续作为上下文传给 LLM。
ttl_seconds = 600
# 最多传入多少条近期听写记录。
max_items = 20
# 最多传入多少个上下文字数。
max_chars = 6000
# 上下文范围：app 表示同一应用，window 表示同一窗口，time 表示仅按时间。
scope = "app"

# 用户确认配置。开启后，润色结果会先显示在文本框中，
# 确认后再记录用户最终文本并插入到当前光标处。
[review]
enabled = true

# 录音输入配置。input_device 为空表示跟随系统默认输入设备。
# 也可以填写 sounddevice 设备编号；在托盘菜单切换后会自动保存。
[audio]
input_device = ""

# 状态栏图标和提示文字。icon 会直接显示在 macOS 状态栏中，建议保持简短。
[status]
idle_icon = "ASR"
recording_icon = "REC ASR"
transcribing_icon = "... ASR"
polishing_icon = "TXT ASR"
inserting_icon = "INS ASR"
reviewing_icon = "EDIT ASR"
error_icon = "! ASR"
idle_text = "空闲"
recording_text = "正在录音"
transcribing_text = "正在转写"
polishing_text = "正在润色"
reviewing_text = "等待确认文本"
inserting_text = "正在插入"
error_text = "错误"

# 调试配置。开启后会把调试快照打印到 stderr。
# Authorization 会自动脱敏；音频 base64 默认只显示长度摘要。
[debug]
dump_remote_requests = false
# 设为 true 会打印完整大字段，例如音频 base64；只建议临时排查时开启。
include_large_request_values = false
# 普通字符串超过这个长度会被截断。
max_request_value_chars = 4000
